
# NOTE: image-based training is significantly more compute-intensive than
# state-based. For initial Colab experiments, use mw_state_dense/cpl_uaot.yaml.

alg: CPL_uAOT
alg_kwargs:
  alpha: 0.1
  bc_coeff: 0.0
  bc_data: all
  bc_steps: 80000

optim: Adam
optim_kwargs:
  lr: 0.0001

network: ActorPolicy
network_kwargs:
  encoder_class: DrQv2Encoder
  actor_class: DrQv2Actor
  actor_kwargs:
    output_act: ["import", "torch.nn", "Tanh"]
    dropout: 0.5

checkpoint: null

eval_env: mw_drawer-open-image-v2

dataset: FeedbackBuffer
dataset_kwargs:
  path: datasets/mw/pref_image/mw_drawer-open-v2_ep2500_n0.3_img64.npz
  batch_size: 48
  segment_length: null
  capacity: 10000
  label_key: rl_sum
  # uAOT requires comparison mode
  mode: comparison

processor: RandomCrop

schedule:
  actor: linear_warmup
schedule_kwargs:
  actor:
    total_steps: 10000
    multiplier: 1.0

trainer_kwargs:
  total_steps: 200000
  log_freq: 500
  profile_freq: 500
  eval_freq: 2500
  eval_fn: eval_policy
  eval_kwargs:
    num_ep: 25
  loss_metric: reward
  train_dataloader_kwargs:
    num_workers: 1
    batch_size: null
  benchmark: True

seed: null
