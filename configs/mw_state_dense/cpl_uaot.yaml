
alg: CPL_uAOT
alg_kwargs:
  alpha: 0.1
  bc_coeff: 0.0
  bc_data: all
  bc_steps: 200000  # use BC to warm up policy network
  # bc_steps: 0     # start from fresh policy network

optim: Adam
optim_kwargs:
  lr: 0.0001

network: ActorPolicy
network_kwargs:
  actor_class: ContinuousMLPActor
  actor_kwargs:
    dropout: 0.25
    output_act: ["import", "torch.nn", "Tanh"]
    hidden_layers: [512, 512]
    ortho_init: True

checkpoint: null

eval_env: mw_drawer-open-v2

dataset: FeedbackBuffer
dataset_kwargs:
  path: datasets/mw/pref/mw_drawer-open-v2_ep2500_n0.3.npz
  batch_size: 96
  segment_length: null
  capacity: 2500
  label_key: rl_sum
  # uAOT requires comparison mode -- each batch needs (obs_1, action_1, obs_2, action_2, label)
  # so the algorithm can identify preferred vs. rejected segments for OT sorting
  mode: comparison

processor: null

schedule:
  actor: linear_warmup
schedule_kwargs:
  actor:
    total_steps: 10000
    multiplier: 1.0

trainer_kwargs:
  total_steps: 500000
  # total_steps: 20000    # minimal amount just to see loss move
  log_freq: 500
  profile_freq: 500
  eval_freq: 5000
  # eval_freq: 2000       # frequent eval checkpoints, about 10
  eval_fn: eval_policy
  eval_kwargs:
    num_ep: 25
    # num_ep: 5           # fewer episodes per eval to speed things up
  loss_metric: reward
  train_dataloader_kwargs:
    num_workers: 0
    batch_size: null

seed: null
